<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory UI</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f0f14;
    color: white;
    font-family: Arial;
}

/* panel */
.panel {
    width: 750px;
    height: 400px;
    background: #1a1a24;
    border-radius: 20px;
    padding: 20px;
    display: flex;
    gap: 20px;
}

/* items */
.items {
    display: flex;
    gap: 10px;
}

.item {
    width: 60px;
    height: 60px;
    background: #2a2a3a;
    border-radius: 10px;

    display: flex;
    justify-content: center;
    align-items: center;

    cursor: pointer;
}

.item img {
    width: 80%;
    height: 80%;
}

/* info panel */
.info-panel {
    flex: 1;
    background: #14141c;
    border-radius: 15px;
    padding: 15px;
}

.info-panel p {
    display: flex;
    align-items: center;
    gap: 8px;
}

/* icons */
.stat-icon {
    width: 50px;
    height: 50px;
}

/* labels */
.label {
    color: #aaa;
}

/* name */
#name {
    font-size: 22px;
    font-weight: bold;
}

/* enchant box */
.enchant-box {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.enchant-box select {
    background: #2a2a3a;
    color: white;
    border: none;
    padding: 6px;
    border-radius: 6px;
}

.enchant-box button {
    background: #3a3a55;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
}

/* enchant display */
#enchantDisplay {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
}

#enchantIcon {
    width: 50px;
    height: 50px;
}
#enchantDescBox {
    display: flex;
    align-items: center;
    gap: 8px;
}
#enchantDesc {
    opacity: 0.8;
    text-align: center;
}

#enchantTitle {
    font-weight: bold;

}
.enchant-box {
    margin-top: 15px;
    display: flex;
    justify-content: center; /* 👈 centers it */
    gap: 10px;
}
</style>
</head>

<body>

<div class="panel">

    <!-- ITEMS -->
    <div class="items">
        <div class="item" onclick="showItem('Flame Sword', 60, 'Magma', 150)">
            <img src="flame.png">
        </div>

        <div class="item" onclick="showItem('Bow', 25, 'Common', 90)">
            <img src="bow.png">
        </div>

        <div class="item" onclick="showItem('Axe', 40, 'Rare', 120)">
            <img src="axe.png">
        </div>

        <div class="item" onclick="showItem('Fangs of Frost', 10, 'Epic', 50)">
            <img src="fof.png">
        </div>

         <div class="item" onclick="showItem('Staff', 100, 'Terror', 200)">
            <img src="staff.png">
        </div>

         <div class="item" onclick="showItem('Obsidian Claymore', 100, 'Void', 200)">
            <img src="obsitian claymore.png">
        </div>
    </div>

    <!-- INFO -->
    <div class="info-panel">
        <h2 id="name">Select Item</h2>

        <p>
            <img class="stat-icon" src="damage.png">
            <span class="label">Damage:</span>
            <span id="damage"></span>
        </p>

        <p>
            <img class="stat-icon" src="rarity.png">
            <span class="label">Rarity:</span>
            <span id="rarity"></span>
        </p>

        <p>
            <img class="stat-icon" src="poweer.png">
            <span class="label">Max LVL:</span>
            <span id="max power lvl"></span>
        </p>

        <!-- ENCHANT DISPLAY -->
        <div id="enchantDisplay">
            <img id="enchantIcon" src="enchant.png">
            <span id="enchantName"></span>
        </div>
        <p id="enchantDescBox">
    <span id="enchantTitle"></span>
    <span id="enchantDesc"></span>
</p>

        <!-- ENCHANT SELECT -->
        <div class="enchant-box">
            <select id="enchantSelect">
                <option value="na">Select Enchant</option>
                <option value="5">Frost (+5)</option>
                <option value="1">+1</option>
                <option value="10">Fire (+10)</option>
                <option value="15">Shock (+15)</option>
                <option value="loot">Loot+</option>
            </select>

            <button onclick="applyEnchant()">Apply</button>
        </div>

    </div>

</div>
<script src="script.js"></script>

</body>
</html>
